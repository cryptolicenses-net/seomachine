<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EDE8E2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="suitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#263a5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1C2B4A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4956A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a3728;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#6b5a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a7a6a;stop-opacity:1" />
    </linearGradient>
    <clipPath id="faceClip">
      <ellipse cx="200" cy="185" rx="82" ry="95" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="url(#bg)" />

  <!-- Suit body -->
  <path d="M 60 500 L 60 360 Q 65 330 100 310 L 148 290 L 200 310 L 252 290 L 300 310 Q 335 330 340 360 L 340 500 Z" fill="url(#suitGrad)" />

  <!-- Suit lapels -->
  <path d="M 148 290 L 190 340 L 200 360 L 210 340 L 252 290 L 240 330 L 200 375 L 160 330 Z" fill="#1a2540" />

  <!-- White shirt -->
  <path d="M 185 295 L 200 360 L 215 295 L 208 285 L 200 290 L 192 285 Z" fill="#f0ece6" />

  <!-- Tie -->
  <path d="M 196 292 L 200 360 L 204 292 L 202 285 L 200 288 L 198 285 Z" fill="#C9A84C" />
  <path d="M 200 360 L 196 380 L 200 385 L 204 380 Z" fill="#b8943e" />

  <!-- Shirt collar -->
  <path d="M 185 295 L 175 270 L 190 265 L 200 285 L 210 265 L 225 270 L 215 295" fill="none" stroke="#d4d0ca" stroke-width="1.5" />
  <path d="M 185 295 L 175 270 L 190 265 L 200 285" fill="#f0ece6" />
  <path d="M 215 295 L 225 270 L 210 265 L 200 285" fill="#e8e4de" />

  <!-- Neck -->
  <rect x="183" y="250" width="34" height="42" rx="5" fill="url(#skinGrad)" />
  <!-- Neck shadow -->
  <path d="M 183 265 Q 183 280 185 290 L 190 290 L 190 265 Z" fill="rgba(0,0,0,0.08)" />

  <!-- Head base -->
  <ellipse cx="200" cy="185" rx="82" ry="95" fill="url(#skinGrad)" />

  <!-- Hair - side part, slightly salt-and-pepper -->
  <ellipse cx="200" cy="105" rx="80" ry="52" fill="url(#hairGrad)" />
  <path d="M 120 140 Q 118 110 128 95 Q 140 78 160 72 Q 180 67 200 68 Q 220 67 240 72 Q 260 78 272 95 Q 282 110 280 140 Q 272 120 260 110 Q 240 98 220 96 Q 200 94 180 96 Q 160 98 140 110 Z" fill="url(#hairGrad)" />
  <!-- Part line -->
  <path d="M 165 68 Q 168 80 170 100" stroke="#3a2c20" stroke-width="1" fill="none" opacity="0.4" />
  <!-- Hair highlights (grey streaks) -->
  <path d="M 125 125 Q 130 105 140 95" stroke="#9a8a78" stroke-width="2.5" fill="none" opacity="0.5" />
  <path d="M 128 135 Q 132 115 145 105" stroke="#b0a090" stroke-width="1.5" fill="none" opacity="0.4" />
  <path d="M 270 130 Q 266 110 256 98" stroke="#9a8a78" stroke-width="2" fill="none" opacity="0.4" />

  <!-- Ears -->
  <ellipse cx="118" cy="188" rx="13" ry="18" fill="#c48a60" />
  <ellipse cx="119" cy="188" rx="8" ry="13" fill="#ba8058" />
  <ellipse cx="282" cy="188" rx="13" ry="18" fill="#c48a60" />
  <ellipse cx="281" cy="188" rx="8" ry="13" fill="#ba8058" />

  <!-- Jaw definition -->
  <path d="M 130 220 Q 145 255 165 265 Q 182 272 200 272 Q 218 272 235 265 Q 255 255 270 220" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="2" />

  <!-- Forehead shadow -->
  <path d="M 132 145 Q 135 130 145 122 Q 160 112 175 110 Q 190 108 200 108 Q 210 108 225 110 Q 240 112 255 122 Q 265 130 268 145" fill="rgba(0,0,0,0.04)" />

  <!-- Eyebrows - strong, slightly bushy, greying -->
  <path d="M 148 154 Q 160 148 178 151" stroke="#4a3c30" stroke-width="5" fill="none" stroke-linecap="round" />
  <path d="M 148 154 Q 160 148 178 151" stroke="#9a8878" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5" />
  <path d="M 222 151 Q 240 148 252 154" stroke="#4a3c30" stroke-width="5" fill="none" stroke-linecap="round" />
  <path d="M 222 151 Q 240 148 252 154" stroke="#9a8878" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5" />

  <!-- Eyes - deep set, intelligent -->
  <!-- Eye sockets shadow -->
  <ellipse cx="163" cy="174" rx="22" ry="14" fill="rgba(0,0,0,0.05)" />
  <ellipse cx="237" cy="174" rx="22" ry="14" fill="rgba(0,0,0,0.05)" />

  <!-- Eyelids upper -->
  <path d="M 143 170 Q 163 163 183 170" fill="#c4855a" />
  <path d="M 217 170 Q 237 163 257 170" fill="#c4855a" />

  <!-- Eyes whites -->
  <ellipse cx="163" cy="175" rx="18" ry="11" fill="#f8f5f0" />
  <ellipse cx="237" cy="175" rx="18" ry="11" fill="#f8f5f0" />

  <!-- Iris - steel blue-grey -->
  <circle cx="163" cy="175" r="9" fill="#4a5e6a" />
  <circle cx="237" cy="175" r="9" fill="#4a5e6a" />
  <!-- Iris detail -->
  <circle cx="163" cy="175" r="6" fill="#3a4e5a" />
  <circle cx="237" cy="175" r="6" fill="#3a4e5a" />
  <!-- Pupils -->
  <circle cx="163" cy="175" r="4" fill="#1a1a22" />
  <circle cx="237" cy="175" r="4" fill="#1a1a22" />
  <!-- Eye highlight -->
  <circle cx="166" cy="172" r="2.5" fill="rgba(255,255,255,0.7)" />
  <circle cx="240" cy="172" r="2.5" fill="rgba(255,255,255,0.7)" />

  <!-- Lower eyelids -->
  <path d="M 145 178 Q 163 185 181 178" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="1" />
  <path d="M 219 178 Q 237 185 255 178" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="1" />

  <!-- Crow's feet wrinkles -->
  <path d="M 183 172 Q 188 168 192 166" stroke="rgba(0,0,0,0.1)" stroke-width="1.2" fill="none" />
  <path d="M 183 176 Q 188 174 191 172" stroke="rgba(0,0,0,0.08)" stroke-width="1" fill="none" />
  <path d="M 217 172 Q 212 168 208 166" stroke="rgba(0,0,0,0.1)" stroke-width="1.2" fill="none" />
  <path d="M 217 176 Q 212 174 209 172" stroke="rgba(0,0,0,0.08)" stroke-width="1" fill="none" />

  <!-- Nose -->
  <path d="M 200 178 L 195 210 Q 192 220 188 222 Q 196 226 200 225 Q 204 226 212 222 Q 208 220 205 210 Z" fill="rgba(0,0,0,0.07)" />
  <path d="M 200 178 L 196 208 Q 194 218 190 221" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 200 178 L 204 208 Q 206 218 210 221" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1.5" stroke-linecap="round" />
  <!-- Nose tip -->
  <ellipse cx="200" cy="222" rx="14" ry="6" fill="rgba(0,0,0,0.06)" />
  <!-- Nostrils -->
  <ellipse cx="191" cy="220" rx="5" ry="4" fill="rgba(0,0,0,0.15)" />
  <ellipse cx="209" cy="220" rx="5" ry="4" fill="rgba(0,0,0,0.15)" />

  <!-- Nasolabial folds -->
  <path d="M 182 222 Q 178 232 180 242" stroke="rgba(0,0,0,0.1)" stroke-width="1.5" fill="none" stroke-linecap="round" />
  <path d="M 218 222 Q 222 232 220 242" stroke="rgba(0,0,0,0.1)" stroke-width="1.5" fill="none" stroke-linecap="round" />

  <!-- Mouth - firm, authoritative -->
  <path d="M 178 242 Q 189 237 200 238 Q 211 237 222 242" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" fill="none" stroke-linecap="round" />
  <!-- Upper lip -->
  <path d="M 180 243 Q 190 240 200 241 Q 210 240 220 243 Q 210 248 200 249 Q 190 248 180 243 Z" fill="#b8745a" />
  <!-- Lower lip -->
  <path d="M 180 243 Q 190 252 200 254 Q 210 252 220 243 Q 210 248 200 249 Q 190 248 180 243 Z" fill="#c8856a" />
  <!-- Mouth line -->
  <path d="M 180 243 Q 200 245 220 243" stroke="rgba(0,0,0,0.25)" stroke-width="1" fill="none" />
  <!-- Subtle smile lines -->
  <path d="M 178 243 Q 174 248 176 255" stroke="rgba(0,0,0,0.1)" stroke-width="1.2" fill="none" />
  <path d="M 222 243 Q 226 248 224 255" stroke="rgba(0,0,0,0.1)" stroke-width="1.2" fill="none" />

  <!-- Forehead lines -->
  <path d="M 158 142 Q 180 138 200 138 Q 220 138 242 142" stroke="rgba(0,0,0,0.06)" stroke-width="1.2" fill="none" />
  <path d="M 162 133 Q 182 129 200 129 Q 218 129 238 133" stroke="rgba(0,0,0,0.04)" stroke-width="1" fill="none" />

  <!-- Chin definition -->
  <path d="M 188 265 Q 200 272 212 265" stroke="rgba(0,0,0,0.08)" stroke-width="1.5" fill="none" />

  <!-- Subtle shadow on sides of face -->
  <path d="M 120 170 Q 122 210 135 240 Q 145 260 160 268" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="8" stroke-linecap="round" />
  <path d="M 280 170 Q 278 210 265 240 Q 255 260 240 268" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="8" stroke-linecap="round" />

  <!-- Glasses (professional, thin frame) -->
  <rect x="138" y="163" width="52" height="26" rx="5" fill="none" stroke="#2a3a50" stroke-width="2.2" />
  <rect x="210" y="163" width="52" height="26" rx="5" fill="none" stroke="#2a3a50" stroke-width="2.2" />
  <!-- Bridge -->
  <path d="M 190 176 Q 200 173 210 176" fill="none" stroke="#2a3a50" stroke-width="2" />
  <!-- Temple pieces -->
  <path d="M 138 176 Q 125 175 118 178" fill="none" stroke="#2a3a50" stroke-width="2" />
  <path d="M 262 176 Q 275 175 282 178" fill="none" stroke="#2a3a50" stroke-width="2" />

  <!-- Pocket square -->
  <path d="M 270 365 L 280 355 L 290 360 L 295 350 L 300 365 Z" fill="#C9A84C" opacity="0.85" />

  <!-- Suit button -->
  <circle cx="200" cy="415" r="5" fill="#0f1a30" />
  <circle cx="200" cy="445" r="5" fill="#0f1a30" />

  <!-- Watch on left wrist (barely visible) -->
  <rect x="92" y="410" width="22" height="12" rx="3" fill="#8a9aaa" opacity="0.6" />

  <!-- Name plate at bottom -->
  <rect x="0" y="455" width="400" height="45" fill="#1C2B4A" />
  <text x="200" y="474" font-family="Georgia, serif" font-size="14" font-weight="600" fill="#C9A84C" text-anchor="middle" letter-spacing="1">Dr. Marcus Hartmann</text>
  <text x="200" y="490" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="0.5">Senior Licensing Advisor · Zug, Switzerland</text>
</svg>
