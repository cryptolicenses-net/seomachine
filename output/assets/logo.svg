<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 228 44" fill="none">
  <!-- Icon mark: navy square -->
  <rect width="44" height="44" fill="#1C2B4A"/>
  <!-- Gold accent stripe at bottom of icon -->
  <rect x="0" y="36" width="44" height="8" fill="#C9A84C"/>

  <!-- Stylized CL mark: C arc -->
  <path d="M30 10 C18 10 12 16 12 22 C12 28 18 34 30 34" stroke="#F5F0EB" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- C crossbars (crypto symbol) -->
  <line x1="12" y1="18" x2="28" y2="18" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="12" y1="26" x2="28" y2="26" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wordmark: CryptoLicenses -->
  <text x="56" y="24"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="17" font-weight="700"
    fill="#1C2B4A" letter-spacing="-0.5">CryptoLicenses</text>

  <!-- .net suffix in mono style -->
  <text x="57" y="37"
    font-family="'Courier New', Courier, monospace"
    font-size="9.5" font-weight="400"
    fill="#C9A84C" letter-spacing="2.5">.NET</text>
</svg>
